services:
  app:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: gestionhotel:latest
    container_name: gestionhotel-app
    restart: unless-stopped
    environment:
      - DATA_DIR=/app/Data
      - ASPNETCORE_ENVIRONMENT=Production
      # L'application vit sous lp2medoune.com/gestionhotel
      - PATH_BASE=/gestionhotel
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - SMTP_FROM=${SMTP_FROM:-}
      - SMTP_SSL=${SMTP_SSL:-true}
    volumes:
      # Base SQLite + clés persistées hors conteneur
      - ./data:/app/Data
      - ./keys:/app/keys
    expose:
      - "8080"

# On rejoint le réseau Docker existant où tourne déjà Caddy (gestionbar-caddy)
networks:
  default:
    name: gestionbarrestaurant_default
    external: true
